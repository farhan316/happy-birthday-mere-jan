<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Nafeesa ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
background:black;
overflow:hidden;
color:white;
}

/* Intro */
#intro{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
font-size:40px;
animation: fadeOut 3s forwards 3s;
}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}

/* Card */
.card{
backdrop-filter: blur(20px);
background: rgba(255,255,255,0.15);
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 0 40px rgba(255,105,180,0.6);
display:none;
animation: fadeIn 2s ease forwards;
}
@keyframes fadeIn{
from{opacity:0; transform:translateY(40px);}
to{opacity:1;}
}

button{
padding:15px 30px;
border:none;
border-radius:30px;
background:white;
color:#ff4e8a;
font-size:18px;
cursor:pointer;
margin-top:20px;
transition:0.3s;
}
button:hover{transform:scale(1.1);}

#surprise{display:none;margin-top:20px;}

.cake{font-size:100px;}

.name{
font-size:32px;
color:#ffb6c1;
animation: glow 2s infinite alternate;
}
@keyframes glow{
from{text-shadow:0 0 10px pink;}
to{text-shadow:0 0 30px hotpink;}
}

/* Fireworks canvas */
canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}
</style>
</head>

<body>

<div id="intro">✨ For Nafeesa ❤️ ✨</div>

<div class="card" id="main">
<h1 class="name">Nafeesa 💖</h1>
<h2>Tap For Surprise 🎁</h2>
<button onclick="openGift()">Open ❤️</button>

<div id="surprise">
<div class="cake">🎂</div>
<h2>Happy Birthday Mere Jan Nifii ❤️</h2>
<p>You are my forever 🥰</p>
</div>
</div>

<canvas id="fireworks"></canvas>

<audio id="music" src="https://cdn.pixabay.com/audio/2022/03/15/audio_9a1c8dbb58.mp3"></audio>

<script>
setTimeout(()=>{
document.getElementById("main").style.display="block";
},3500);

function openGift(){
document.getElementById("surprise").style.display="block";
startFireworks();
document.getElementById("music").play();
}

/* Fireworks */
const canvas = document.getElementById('fireworks');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function startFireworks(){
for(let i=0;i<100;i++){
setTimeout(()=>createFirework(), i*30);
}
}

function createFirework(){
let x = Math.random()*canvas.width;
let y = Math.random()*canvas.height/2;
for(let i=0;i<50;i++){
let angle = Math.random()*Math.PI*2;
let speed = Math.random()*5;
let dx = Math.cos(angle)*speed;
let dy = Math.sin(angle)*speed;
animateParticle(x,y,dx,dy);
}
}

function animateParticle(x,y,dx,dy){
let life = 50;
function draw(){
if(life<=0) return;
ctx.fillStyle = "hsl("+Math.random()*360+",100%,50%)";
ctx.fillRect(x,y,3,3);
x+=dx;
y+=dy;
life--;
requestAnimationFrame(draw);
}
draw();
}
</script>

</body>
</html>
